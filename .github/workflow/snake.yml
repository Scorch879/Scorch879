name: Generate Snake Animation

on:
  schedule: # Automatically updates the animation every 12 hours
    - cron: "0 */12 * * *" 
  workflow_dispatch: # Allows you to manually trigger it anytime

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Generate contribution snake pixels
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Scorch879
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
            
      - name: Push animation updates to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
